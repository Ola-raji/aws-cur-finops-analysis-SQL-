<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data model · Star schema · AWS CUR FinOps Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #ffffff;
    font-family: 'DM Sans', sans-serif;
    color: #0e0e0e;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 64px 40px;
  }
  .frame {
    width: 100%;
    max-width: 1140px;
  }
</style>
</head>
<body>

<!--
  Coordinate system:
    SVG canvas: 1140 wide × 940 tall
    Three dim tables in a row, top y = 90
    Fact table centered, top y = 480
    Routing channel at y = 410 (single shared channel)
-->

<svg
  class="frame"
  viewBox="0 0 1140 940"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'DM Mono', monospace"
  role="img"
  aria-label="Star schema diagram for the AWS CUR FinOps analysis project. Three dimension tables — dim_service, dim_resource, bridge_tags — connect into a central fact table fct_daily_cost via primary-key to foreign-key relationships."
>

  <!-- ════════════════════════════════════════════════════════════════════════
       EYEBROW
       ════════════════════════════════════════════════════════════════════════ -->
  <g>
    <text x="60" y="44"
          font-size="11" letter-spacing="3" fill="#9a9a9a"
          font-family="'DM Mono', monospace">
      AWS CUR FinOps Analysis &#x2022; Phase 1 &#x2022; Data model
    </text>
    <line x1="500" y1="40" x2="1080" y2="40" stroke="#e6e6e6" stroke-width="0.5"/>
  </g>

  <!-- ════════════════════════════════════════════════════════════════════════
       DIM TABLES — top row
       Three columns: dim_service @ x=80, dim_resource @ x=460, bridge_tags @ x=820
       Each table 240px wide
       Header lines at y=110 (schema), y=130 (table name)
       Rule at y=146
       Columns start at y=170, each row 22px tall
       ════════════════════════════════════════════════════════════════════════ -->

  <!-- ───────────────── dim_service ───────────────── -->
  <g>
    <text x="80" y="110" font-size="10" letter-spacing="2.5" fill="#bababa">
      MARTS &#x2022; DIMENSION
    </text>
    <text x="80" y="132" font-size="15" font-weight="500" fill="#0e0e0e" letter-spacing="0.4">
      dim_service
    </text>
    <line x1="80" y1="146" x2="320" y2="146" stroke="#cfcfcf" stroke-width="0.5"/>

    <!-- Row 1: service_code (PK) — anchor for outgoing line -->
    <text x="80"  y="174" font-size="12.5" font-weight="500" fill="#0e0e0e">service_code</text>
    <text x="280" y="174" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>
    <rect x="290" y="163" width="22" height="14" rx="2" fill="none" stroke="#0e0e0e" stroke-width="0.5"/>
    <text x="301" y="173" font-size="9" fill="#0e0e0e" text-anchor="middle" letter-spacing="0.7" font-weight="500">PK</text>
    <!-- origin dot for L1 -->
    <circle cx="316" cy="170" r="2.6" fill="#1a1a1a"/>

    <!-- Row 2 -->
    <text x="80"  y="196" font-size="12.5" fill="#5a5a5a">service_name</text>
    <text x="280" y="196" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>

    <!-- Row 3 -->
    <text x="80"  y="218" font-size="12.5" fill="#5a5a5a">service_category</text>
    <text x="280" y="218" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>
  </g>

  <!-- ───────────────── dim_resource ───────────────── -->
  <g>
    <text x="460" y="110" font-size="10" letter-spacing="2.5" fill="#bababa">
      MARTS &#x2022; DIMENSION
    </text>
    <text x="460" y="132" font-size="15" font-weight="500" fill="#0e0e0e" letter-spacing="0.4">
      dim_resource
    </text>
    <line x1="460" y1="146" x2="700" y2="146" stroke="#cfcfcf" stroke-width="0.5"/>

    <!-- Row 1: resource_id (PK) -->
    <text x="460" y="174" font-size="12.5" font-weight="500" fill="#0e0e0e">resource_id</text>
    <text x="660" y="174" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>
    <rect x="670" y="163" width="22" height="14" rx="2" fill="none" stroke="#0e0e0e" stroke-width="0.5"/>
    <text x="681" y="173" font-size="9" fill="#0e0e0e" text-anchor="middle" letter-spacing="0.7" font-weight="500">PK</text>
    <!-- origin dot for L2: line drops straight down from PK row centre -->
    <circle cx="580" cy="170" r="2.6" fill="#1a1a1a"/>

    <text x="460" y="196" font-size="12.5" fill="#5a5a5a">resource_type</text>
    <text x="660" y="196" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>

    <text x="460" y="218" font-size="12.5" fill="#5a5a5a">resource_name</text>
    <text x="660" y="218" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>

    <text x="460" y="240" font-size="12.5" fill="#5a5a5a">region</text>
    <text x="660" y="240" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>

    <text x="460" y="262" font-size="12.5" fill="#5a5a5a">availability_zone</text>
    <text x="660" y="262" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>
  </g>

  <!-- ───────────────── bridge_tags ───────────────── -->
  <g>
    <text x="820" y="110" font-size="10" letter-spacing="2.5" fill="#bababa">
      MARTS &#x2022; BRIDGE
    </text>
    <text x="820" y="132" font-size="15" font-weight="500" fill="#0e0e0e" letter-spacing="0.4">
      bridge_tags
    </text>
    <line x1="820" y1="146" x2="1060" y2="146" stroke="#cfcfcf" stroke-width="0.5"/>

    <!-- Row 1: resource_id (PK) — anchor for outgoing dashed line -->
    <text x="820"  y="174" font-size="12.5" font-weight="500" fill="#0e0e0e">resource_id</text>
    <text x="1020" y="174" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>
    <rect x="1030" y="163" width="22" height="14" rx="2" fill="none" stroke="#0e0e0e" stroke-width="0.5"/>
    <text x="1041" y="173" font-size="9" fill="#0e0e0e" text-anchor="middle" letter-spacing="0.7" font-weight="500">PK</text>
    <!-- origin dot for L3 -->
    <circle cx="816" cy="170" r="2.6" fill="#9a4400"/>

    <text x="820"  y="196" font-size="12.5" fill="#5a5a5a">tag_project</text>
    <text x="1020" y="196" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>

    <text x="820"  y="218" font-size="12.5" fill="#5a5a5a">tag_environment</text>
    <text x="1020" y="218" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>

    <text x="820"  y="240" font-size="12.5" fill="#5a5a5a">tag_cost_center</text>
    <text x="1020" y="240" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>

    <text x="820"  y="262" font-size="12.5" fill="#5a5a5a">tag_workload</text>
    <text x="1020" y="262" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>

    <text x="820"  y="284" font-size="12.5" fill="#5a5a5a">tag_owner</text>
    <text x="1020" y="284" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>

    <text x="820"  y="306" font-size="12.5" fill="#5a5a5a">tag_criticality</text>
    <text x="1020" y="306" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>

    <text x="820"  y="328" font-size="12.5" fill="#5a5a5a">tag_source</text>
    <text x="1020" y="328" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════════════════
       ROUTING CHANNEL (y=410) — single shared horizontal axis
       Connector lines drop from PK origins, traverse the channel, drop into FK rows
       FK row centers (where text baseline lives):
         service_code FK row text baseline = 614 → arrow tip = 612
         resource_id  FK row text baseline = 678 → arrow tip = 676
       Arrows enter FK rows from the LEFT EDGE of the fact table at the row centre,
       so they don't pierce through other rows above the target.
       Fact table left edge = x=410, right edge = x=730
       ════════════════════════════════════════════════════════════════════════ -->

  <!-- L1: dim_service.service_code (origin 316,170) → fct.service_code FK row -->
  <!-- Path: down to channel → across to fact left edge → into row 614 -->
  <path d="M 316 170 L 316 410 L 400 410 L 400 614 L 458 614"
        fill="none" stroke="#1a1a1a" stroke-width="0.7"
        stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="458,610 466,614 458,618" fill="#1a1a1a"/>

  <!-- L2: dim_resource.resource_id (origin 580,170) → fct.resource_id FK row -->
  <!-- Path: down to channel → small offset → into row 678 from left edge -->
  <path d="M 580 170 L 580 410 L 405 410 L 405 678 L 458 678"
        fill="none" stroke="#1a1a1a" stroke-width="0.7"
        stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="458,674 466,678 458,682" fill="#1a1a1a"/>

  <!-- L3: bridge_tags.resource_id (origin 816,170) → fct.resource_id FK row, enters from RIGHT edge -->
  <!-- Path: down to channel → across to fact right edge → into row 678 from right -->
  <path d="M 816 170 L 816 410 L 740 410 L 740 678 L 720 678"
        fill="none" stroke="#9a4400" stroke-width="0.7"
        stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="3 3"/>
  <polygon points="720,674 712,678 720,682" fill="#9a4400"/>

  <!-- "resolved at load" label, sitting above the channel in the L3 traversal area -->
  <text x="778" y="402" font-size="10" fill="#9a4400"
        text-anchor="middle" letter-spacing="1.2" font-style="italic">
    resolved at load
  </text>

  <!-- ════════════════════════════════════════════════════════════════════════
       FACT TABLE — centered, axis-aligned with dim_resource above
       Top y = 478, centered horizontally (x = 410 to 730 for the table block)
       ════════════════════════════════════════════════════════════════════════ -->

  <g>
    <text x="410" y="498" font-size="10" letter-spacing="2.5" fill="#bababa">
      MARTS &#x2022; FACT &#x2022; 1,882 ROWS
    </text>
    <text x="410" y="520" font-size="15" font-weight="500" fill="#8a5500" letter-spacing="0.4">
      fct_daily_cost
    </text>
    <line x1="410" y1="534" x2="730" y2="534" stroke="#c07820" stroke-width="0.5" opacity="0.5"/>

    <!-- Group: time -->
    <text x="410" y="552" font-size="9" letter-spacing="2.5" fill="#cccccc">TIME</text>
    <text x="410" y="572" font-size="12.5" fill="#5a5a5a">usage_date</text>
    <text x="710" y="572" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">DATE</text>

    <!-- Group: service — service_code is FK target for L1 (y=540) -->
    <text x="410" y="594" font-size="9" letter-spacing="2.5" fill="#cccccc">SERVICE</text>
    <text x="410" y="614" font-size="12.5" font-weight="500" fill="#9a4400">service_code</text>
    <text x="688" y="614" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>
    <rect x="698" y="603" width="22" height="14" rx="2" fill="none" stroke="#9a4400" stroke-width="0.5"/>
    <text x="709" y="613" font-size="9" fill="#9a4400" text-anchor="middle" letter-spacing="0.7" font-weight="500">FK</text>

    <text x="410" y="636" font-size="12.5" fill="#5a5a5a">line_item_type</text>
    <text x="710" y="636" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>

    <!-- Group: resource — resource_id is FK target for L2 and L3 (y=570) -->
    <text x="410" y="658" font-size="9" letter-spacing="2.5" fill="#cccccc">RESOURCE</text>
    <text x="410" y="678" font-size="12.5" font-weight="500" fill="#9a4400">resource_id</text>
    <text x="688" y="678" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>
    <rect x="698" y="667" width="22" height="14" rx="2" fill="none" stroke="#9a4400" stroke-width="0.5"/>
    <text x="709" y="677" font-size="9" fill="#9a4400" text-anchor="middle" letter-spacing="0.7" font-weight="500">FK</text>

    <text x="410" y="700" font-size="12.5" fill="#5a5a5a">availability_zone</text>
    <text x="710" y="700" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>

    <!-- Group: cost -->
    <text x="410" y="722" font-size="9" letter-spacing="2.5" fill="#cccccc">COST</text>
    <text x="410" y="742" font-size="12.5" fill="#5a5a5a">on_demand_cost</text>
    <text x="710" y="742" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">NUMERIC</text>

    <text x="410" y="764" font-size="12.5" fill="#5a5a5a">unblended_cost</text>
    <text x="710" y="764" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">NUMERIC</text>

    <text x="410" y="786" font-size="12.5" fill="#5a5a5a">effective_cost</text>
    <text x="710" y="786" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">NUMERIC</text>

    <!-- Group: attribution -->
    <text x="410" y="808" font-size="9" letter-spacing="2.5" fill="#cccccc">ATTRIBUTION</text>
    <text x="410" y="828" font-size="12.5" fill="#5a5a5a">tag_workload, tag_cost_center&#x2026;</text>
    <text x="710" y="828" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>

    <text x="410" y="850" font-size="12.5" fill="#5a5a5a">tag_source</text>
    <text x="710" y="850" font-size="10" fill="#c8c8c8" text-anchor="end" letter-spacing="1">TEXT</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════════════════
       LEGEND — bottom, aligned to left margin
       ════════════════════════════════════════════════════════════════════════ -->
  <g transform="translate(60, 900)">
    <line x1="0" y1="0" x2="22" y2="0" stroke="#1a1a1a" stroke-width="0.7"/>
    <text x="30" y="4" font-size="10.5" fill="#8a8a8a" letter-spacing="0.7">direct join</text>

    <line x1="135" y1="0" x2="157" y2="0" stroke="#9a4400" stroke-width="0.7" stroke-dasharray="3 3"/>
    <text x="165" y="4" font-size="10.5" fill="#8a8a8a" letter-spacing="0.7">resolved at load</text>

    <rect x="295" y="-7" width="22" height="14" rx="2" fill="none" stroke="#0e0e0e" stroke-width="0.5"/>
    <text x="306" y="3" font-size="9" fill="#0e0e0e" text-anchor="middle" letter-spacing="0.7" font-weight="500">PK</text>
    <text x="325" y="4" font-size="10.5" fill="#8a8a8a" letter-spacing="0.7">primary key</text>

    <rect x="410" y="-7" width="22" height="14" rx="2" fill="none" stroke="#9a4400" stroke-width="0.5"/>
    <text x="421" y="3" font-size="9" fill="#9a4400" text-anchor="middle" letter-spacing="0.7" font-weight="500">FK</text>
    <text x="440" y="4" font-size="10.5" fill="#8a8a8a" letter-spacing="0.7">foreign key</text>
  </g>

</svg>

</body>
</html>
